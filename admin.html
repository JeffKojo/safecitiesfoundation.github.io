<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Staff Admin — Safe Cities Foundation</title>
  <link rel="icon" type="image/png" href="assets/img/logo/fc_icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: #F2EEE6; }
    .adm-topbar {
      position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 14px clamp(16px, 4vw, 40px); background: #0B1D35; color: #fff;
    }
    .adm-topbar img { height: 34px; }
    .adm-topbar .who { display: flex; align-items: center; gap: 14px; font-size: .86rem; color: rgba(255,255,255,.7); }
    .adm-btn {
      font-family: inherit; font-size: .88rem; font-weight: 600; border-radius: 7px; border: none;
      padding: 10px 18px; cursor: pointer; transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
    }
    .adm-btn--primary { background: #E84E1B; color: #fff; box-shadow: 0 6px 16px rgba(232,78,27,.28); }
    .adm-btn--primary:hover { transform: translateY(-1px); }
    .adm-btn--ghost { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.3); }
    .adm-btn--ghost:hover { background: rgba(255,255,255,.1); }
    .adm-btn--soft { background: rgba(11,29,53,.06); color: #0B1D35; }
    .adm-btn--soft:hover { background: rgba(11,29,53,.12); }
    .adm-btn--danger { background: rgba(220,38,38,.1); color: #B91C1C; }
    .adm-btn--danger:hover { background: rgba(220,38,38,.18); }
    .adm-btn:disabled { opacity: .5; cursor: default; transform: none; }

    /* Login */
    .adm-login { min-height: 78vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .adm-login__card {
      width: min(420px, 100%); background: #fff; border-radius: 16px; padding: 40px;
      box-shadow: 0 12px 40px rgba(11,29,53,.1); border: 1px solid rgba(11,29,53,.06);
    }
    .adm-login__card h1 { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 1.7rem; color: #0B1D35; margin: 0 0 6px; }
    .adm-login__card p { font-size: .92rem; color: #525B6B; margin: 0 0 26px; }
    .adm-err { color: #B91C1C; font-size: .86rem; margin-top: 14px; min-height: 1.1em; }

    /* Shell */
    .adm-wrap { max-width: 1080px; margin: 0 auto; padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 40px); }
    .adm-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .adm-tab {
      font-family: inherit; font-size: .92rem; font-weight: 600; color: #525B6B; background: transparent;
      border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; transition: background .2s, color .2s;
    }
    .adm-tab.is-active { background: #0B1D35; color: #fff; }
    .adm-tab .count { font-size: .78rem; opacity: .7; margin-left: 6px; }

    .adm-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .adm-panel-head h2 { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 1.5rem; color: #0B1D35; margin: 0; }

    .adm-list { display: flex; flex-direction: column; gap: 12px; }
    .adm-row {
      display: flex; align-items: center; gap: 16px; background: #fff; border: 1px solid rgba(11,29,53,.07);
      border-radius: 12px; padding: 14px 18px;
    }
    .adm-row__thumb { flex: none; width: 64px; height: 48px; border-radius: 7px; object-fit: cover; background: #e8e2d6; }
    .adm-row__thumb--ph { display: flex; align-items: center; justify-content: center; font-size: .6rem; color: #8A93A3; background-image: repeating-linear-gradient(45deg, #e6e0d4 0 6px, #efeae0 6px 12px); }
    .adm-row__body { flex: 1; min-width: 0; }
    .adm-row__title { font-weight: 600; color: #0B1D35; font-size: .98rem; }
    .adm-row__meta { font-size: .8rem; color: #8A93A3; margin-top: 3px; }
    .adm-row__actions { display: flex; gap: 8px; flex: none; }
    .adm-badge { display: inline-block; font-size: .68rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: rgba(245,166,35,.18); color: #9A6500; margin-left: 8px; }
    .adm-badge--new { background: rgba(232,78,27,.12); color: #C53A0F; }
    .adm-empty { text-align: center; color: #8A93A3; padding: 40px; font-size: .92rem; }

    /* Form */
    .adm-form { background: #fff; border: 1px solid rgba(11,29,53,.07); border-radius: 14px; padding: clamp(20px, 3vw, 32px); box-shadow: 0 8px 30px rgba(11,29,53,.06); }
    .adm-form h3 { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 1.3rem; color: #0B1D35; margin: 0 0 20px; }
    .adm-field { margin-bottom: 16px; }
    .adm-field label { display: block; font-size: .82rem; font-weight: 600; color: #0B1D35; margin-bottom: 6px; }
    .adm-field input, .adm-field textarea, .adm-field select {
      width: 100%; padding: 11px 13px; border: 1.5px solid rgba(11,29,53,.14); border-radius: 8px;
      font-family: inherit; font-size: .92rem; color: #0B1D35; background: #FAF9F6; outline: none; transition: border-color .2s;
    }
    .adm-field textarea { min-height: 96px; resize: vertical; }
    .adm-field input:focus, .adm-field textarea:focus, .adm-field select:focus { border-color: #E84E1B; }
    .adm-grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
    .adm-hint { font-size: .78rem; color: #8A93A3; margin-top: 5px; }
    .adm-check { display: flex; align-items: center; gap: 10px; }
    .adm-check input { width: auto; }
    .adm-preview { margin-top: 10px; }
    .adm-preview img { max-height: 120px; border-radius: 8px; border: 1px solid rgba(11,29,53,.1); }
    .adm-form__actions { display: flex; gap: 12px; margin-top: 24px; }
    .adm-msg-body { font-size: .9rem; color: #525B6B; line-height: 1.6; margin-top: 8px; white-space: pre-wrap; }
    .adm-note { background: rgba(29,78,216,.06); border: 1px solid rgba(29,78,216,.14); color: #1D4ED8; font-size: .84rem; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; }
    .adm-hide { display: none !important; }
    @media (max-width: 620px) { .adm-row { flex-wrap: wrap; } .adm-row__actions { width: 100%; } }
  </style>
</head>
<body>

  <div class="adm-topbar">
    <img src="assets/img/logo/fc_horizontal.png" alt="Safe Cities Foundation" />
    <div class="who">
      <span id="admWho" class="adm-hide"></span>
      <button id="admSignOut" class="adm-btn adm-btn--ghost adm-hide" type="button">Sign out</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="adm-login" id="admLogin">
    <div class="adm-login__card">
      <h1>Staff sign in</h1>
      <p>Manage projects, news, and messages for the Safe Cities Foundation website.</p>
      <form id="admLoginForm">
        <div class="adm-field">
          <label for="admEmail">Email</label>
          <input id="admEmail" type="email" autocomplete="username" required />
        </div>
        <div class="adm-field">
          <label for="admPass">Password</label>
          <input id="admPass" type="password" autocomplete="current-password" required />
        </div>
        <button class="adm-btn adm-btn--primary" type="submit" style="width:100%; padding:13px;">Sign in</button>
        <div class="adm-err" id="admLoginErr"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <main class="adm-wrap adm-hide" id="admDash">
    <div class="adm-tabs">
      <button class="adm-tab is-active" data-tab="projects" type="button">Projects <span class="count" id="cntProjects"></span></button>
      <button class="adm-tab" data-tab="news" type="button">News <span class="count" id="cntNews"></span></button>
      <button class="adm-tab" data-tab="messages" type="button">Messages <span class="count" id="cntMessages"></span></button>
    </div>
    <section id="admPanel"></section>
  </main>

  <!-- content.js exposes window.SCF.seed for the "Import starter content" button -->
  <script src="js/content.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
